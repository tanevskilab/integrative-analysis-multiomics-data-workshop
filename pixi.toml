[workspace]
name = "integrative-analysis-multiomics-data-workshop"
version = "0.1.0"
description = "TOAST + spatialdata and DOTpy environments for the multiomics workshop"
authors = ["leotenshii <leotenshii@gmail.com>"]
channels = ["conda-forge"]
# spatialdata hard-depends on conda-forge `pytorch`, which otherwise resolves to
# a CPU-only build. Declaring cuda capability on the linux-64 entry (requires
# pixi >=0.72) makes the solver pick the CUDA-enabled pytorch build there (see
# the cuda-version pin under feature.toast below). No effect on osx-arm64:
# there is no CUDA-enabled build for macOS.
# NOTE: no [feature.*.platforms] override may coexist with this enriched form —
# every feature must inherit platforms from here rather than re-declaring them.
platforms = [{ platform = "linux-64", cuda = "12" }, "osx-arm64"]

[environments]
toast = { features = ["toast"], no-default-feature = true }
dotpy = { features = ["dotpy"], no-default-feature = true }

# ---------------------------------------------------------------------------
# TOAST + spatialdata environment
# ---------------------------------------------------------------------------
[feature.toast]

[feature.toast.dependencies]
python = "3.11.*"

# TOAST core dependencies
numpy = ">=1.24"
scipy = ">=1.10"
pandas = ">=1.5"
scikit-learn = ">=1.3"
networkx = ">=3.0"
pot = ">=0.9.0"
anndata = ">=0.9"
scanpy = ">=1.9"

# spatialdata and its heavy binary deps (resolved via conda-forge, avoids pip backtracking)
spatialdata = "*"
geopandas = ">=0.14"
shapely = ">=2.0.1"
zarr = ">=3.0.0"
dask = "*"
scikit-image = "*"
pyarrow = "*"

# Notebook / visualization
matplotlib = "*"
seaborn = "*"
ipykernel = "*"
notebook = "*"
numba = ">=0.55"
umap-learn = "*"
igraph = "*"
python-igraph = "*"
leidenalg = "*"
pynvml = "*"
pytorch = ">=2.12.1,<3"

[feature.toast.target.linux-64.dependencies]
cuda-version = ">=12,<13"

[feature.toast.pypi-dependencies]
toast-spatial-ot = { git = "https://github.com/cecca46/TOAST.git" }

# ---------------------------------------------------------------------------
# DOTpy environment
# ---------------------------------------------------------------------------
[feature.dotpy]

[feature.dotpy.dependencies]
python = "3.11.*"
numpy = ">=2.4.6,<3"
scanpy = ">=1.9.0"
anndata = ">=0.8.0"
matplotlib = ">=3.11.0,<4"
scikit-learn = ">=1.9.0,<2"
scipy = ">=1.17.1,<2"
ipykernel = ">=7.3.0,<8"
notebook = "*"
jupyterlab = ">=4.6.0,<5"
scikit-misc = ">=0.5.2,<0.6"
python-igraph = ">=0.11,<2"
leidenalg = ">=0.10,<1"

[feature.dotpy.pypi-dependencies]
torch = ">=1.10.0"
torchvision = ">=0.25.0, <0.26"
dotpy = { git = "https://github.com/earmingol/DOTpy"}
#dotpy = { path = "DOT/DOTpy", editable = true }

[feature.dotpy.tasks]
lab = "cd DOT && MPLCONFIGDIR=.matplotlib jupyter lab"
check-gpu = "python -c \"import torch; print(torch.cuda.is_available())\""
check-stack = "MPLCONFIGDIR=.matplotlib python -c \"import scanpy, anndata, torch, scipy, sklearn, matplotlib, pandas, dotpy; print('stack ok')\""
notebook = "cd DOT && MPLCONFIGDIR=.matplotlib jupyter lab quickstart.ipynb"
check-gpu2 = "LD_LIBRARY_PATH=/run/opengl-driver/lib:${LD_LIBRARY_PATH:-} python -c \"import torch; print(torch.cuda.is_available()); print(torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'no cuda')\""
