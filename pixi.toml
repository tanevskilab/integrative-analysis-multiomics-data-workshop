[workspace]
name = "toast-spatialdata"
version = "0.1.0"
description = "TOAST + spatialdata environment"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = "3.11.*"

# TOAST core dependencies
numpy = ">=1.24"
scipy = ">=1.10"
pandas = ">=1.5"
scikit-learn = ">=1.3"
networkx = ">=3.0"
pot = ">=0.9.0"
anndata = ">=0.9"
scanpy = ">=1.9"

# spatialdata and its heavy binary deps (resolved via conda-forge, avoids pip backtracking)
spatialdata = "*"
geopandas = ">=0.14"
shapely = ">=2.0.1"
zarr = ">=3.0.0"
dask = "*"
scikit-image = "*"
pyarrow = "*"

# Notebook / visualization
matplotlib = "*"
seaborn = "*"
ipykernel = "*"
notebook = "*"
numba = ">=0.55"
umap-learn = "*"

[pypi-dependencies]
# Local TOAST package installed in editable mode
toast-spatial-ot = { path = "../TOAST_repo/TOAST", editable = true }
